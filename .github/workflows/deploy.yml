name: Deploy Website

on:
  push:
    branches:
      - main
      - claude/hosiery-company-website-XYJkw

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: frontend
        run: yarn install

      - name: Build
        working-directory: frontend
        run: PUBLIC_URL=/Xperiment-clothing- yarn build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend/build
          branch: gh-pages
